name: Debug documentation links

on:
  pull_request:
    types: [reopened]

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Generate offline link report
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress 'README.md' 'docs/**/*.md'
          fail: false
          failIfEmpty: false
          output: lychee/results.md
      - name: Upload link report
        uses: actions/upload-artifact@v4
        with:
          name: documentation-link-report
          path: lychee/results.md
          if-no-files-found: error
