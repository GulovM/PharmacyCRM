name: Run final documentation migration

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  migrate:
    if: github.event.issue.pull_request && github.event.comment.body == '/run-final-doc-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply and validate documentation migration
        shell: bash
        run: |
          python3 .github/scripts/finalize_docs.py
          rm -f .github/scripts/finalize_docs.py .github/workflows/run-final-doc-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete documentation amendment incorporation"
          git push origin HEAD:main
