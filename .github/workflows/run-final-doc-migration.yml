name: Run final documentation migration

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  migrate:
    if: github.event.issue.pull_request && github.event.comment.body == '/run-final-doc-migration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Patch residual migration normalization
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('.github/scripts/finalize_docs.py')
          text = path.read_text(encoding='utf-8')
          marker = "# -----------------------------------------------------------------------------\n# Cross-document validation.\n"
          patch = '''# -----------------------------------------------------------------------------
# Final normalization: remove all wording that can be mistaken for a persisted
# authorization-version column or protocol. Authorization freshness is derived
# from current user/session/role/assignment/pharmacy records.
# -----------------------------------------------------------------------------
for _name in [
    "04-architecture.md",
    "04-01-backend-architecture.md",
    "05-api-design.md",
    "06-database-design.md",
    "07-domain-model.md",
    "08-project-structure.md",
    "09-security-design.md",
    "10-sequence-diagrams.md",
    "11-development-roadmap.md",
    "12-deployment.md",
    "13-testing-strategy.md",
    "14-observability.md",
]:
    _text = load(_name)
    _text = re.sub(r"(?i)\\bauth[_ -]?version\\b", "authorization state", _text)
    _text = _text.replace("version-counter авторизации", "authorization state")
    save(_name, _text)

'''
          if patch not in text:
              if marker not in text:
                  raise RuntimeError('cross-document validation marker not found')
              text = text.replace(marker, patch + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Apply and validate documentation migration
        id: finalize
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 .github/scripts/finalize_docs.py > /tmp/finalize-docs.log 2>&1
          code=$?
          printf '%s\n' "$code" > /tmp/finalize-docs.exit
          exit "$code"

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-doc-migration-diagnostics
          path: |
            /tmp/finalize-docs.log
            /tmp/finalize-docs.exit
          if-no-files-found: error
          retention-days: 1

      - name: Commit completed migration
        if: steps.finalize.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/scripts/finalize_docs.py .github/workflows/run-final-doc-migration.yml .github/workflows/run-final-doc-on-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete documentation amendment incorporation"
          git push origin HEAD:main

      - name: Report migration failure
        if: steps.finalize.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/finalize-docs.log
          exit 1
