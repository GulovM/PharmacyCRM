name: Trigger documentation incorporation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  incorporate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Execute registered incorporation workflow
        shell: bash
        run: |
          awk '
            /run: \|/ { capture=1; next }
            capture {
              if ($0 ~ /^          /) {
                sub(/^          /, "")
                print
              }
            }
          ' .github/workflows/incorporate-documentation.yml > /tmp/incorporate.sh

          sed -i 's#rm -f .github/workflows/incorporate-documentation.yml#rm -f .github/workflows/incorporate-documentation.yml .github/workflows/trigger-documentation-incorporation.yml#' /tmp/incorporate.sh
          bash /tmp/incorporate.sh
