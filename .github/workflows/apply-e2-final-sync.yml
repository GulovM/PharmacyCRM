name: Apply E2 final sync

on:
  pull_request:
  push:
    branches:
      - Database-Kernel-and-Reliability-Primitives

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Database-Kernel-and-Reliability-Primitives
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply exact documentation patches
        run: |
          git fetch --no-tags --depth=1 origin 063ffde10a6d7c34e971edc61d0b4e1e8cd1435d
          git show 063ffde10a6d7c34e971edc61d0b4e1e8cd1435d:docs/04-01-backend-architecture.md > docs/04-01-backend-architecture.md
          python scripts/apply-e2-final-sync.py
          git checkout -- .github/workflows/ci.yml
          python - <<'PY'
          from pathlib import Path
          for name in (
              'docs/09-security-design.md',
              'docs/11-development-roadmap.md',
              'docs/12-deployment.md',
              'docs/13-testing-strategy.md',
              'docs/14-observability.md',
          ):
              path = Path(name)
              path.write_text(path.read_text().replace('**Дата:** 2026-07-22  \n', '**Дата:** 2026-07-21  \n', 1))
          PY
      - name: Verify current schema references
        run: |
          if grep -RniE 'current E2 schema `21`|application compatibility[^\n]*schema version `21`' docs deploy backend --exclude='*.sum'; then
            echo 'Found stale current-state schema 21 reference'
            exit 1
          fi
      - name: Commit synchronized documentation
        id: commit
        continue-on-error: true
        run: |
          set -o pipefail
          {
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add docs
            git diff --cached --check
            git commit -m 'Synchronize E2 final deployment and reliability contracts'
            git push origin HEAD:Database-Kernel-and-Reliability-Primitives
          } 2>&1 | tee "$RUNNER_TEMP/e2-final-sync.log"
      - name: Upload synchronization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2-final-sync-log
          path: ${{ runner.temp }}/e2-final-sync.log
          if-no-files-found: error
          retention-days: 1
      - name: Propagate synchronization failure
        if: steps.commit.outcome != 'success'
        run: exit 1
