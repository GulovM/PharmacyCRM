name: Apply E2 final sync

on:
  pull_request:
  push:
    branches:
      - Database-Kernel-and-Reliability-Primitives

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Database-Kernel-and-Reliability-Primitives
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply exact documentation patches
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-e2-final-sync.py')
          source = path.read_text()
          source = source.replace(
              '    if text.count(old) != 1:\n        raise RuntimeError(f"expected one marker in {path}, found {text.count(old)}")\n    target.write_text(text.replace(old, new, 1))',
              '    count = text.count(old)\n    if count == 0 and new in text:\n        return\n    if count != 1:\n        raise RuntimeError(f"expected one marker in {path}, found {count}")\n    target.write_text(text.replace(old, new, 1))',
              1,
          )
          exec(compile(source, str(path), 'exec'))
          PY
          git checkout -- .github/workflows/ci.yml
      - name: Verify current schema references
        run: |
          if grep -RniE 'current E2 schema `21`|application compatibility[^\n]*schema version `21`' docs deploy backend --exclude='*.sum'; then
            echo 'Found stale current-state schema 21 reference'
            exit 1
          fi
      - name: Commit synchronized documentation
        id: commit
        continue-on-error: true
        run: |
          set -o pipefail
          {
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add docs
            git diff --cached --check
            git commit -m 'Synchronize E2 final deployment and reliability contracts'
            git push origin HEAD:Database-Kernel-and-Reliability-Primitives
          } 2>&1 | tee "$RUNNER_TEMP/e2-final-sync.log"
      - name: Upload synchronization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2-final-sync-log
          path: ${{ runner.temp }}/e2-final-sync.log
          if-no-files-found: error
          retention-days: 1
      - name: Propagate synchronization failure
        if: steps.commit.outcome != 'success'
        run: exit 1
