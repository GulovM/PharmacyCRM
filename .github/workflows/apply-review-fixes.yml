name: Apply E2 review fixes

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Database-Kernel-and-Reliability-Primitives
          fetch-depth: 0
      - name: Apply prepared fixes
        run: |
          bash .review-fixes/01-provisioning.sh
          bash .review-fixes/02-replay-retention.sh
      - name: Check Bash source-size fixtures
        run: bash scripts/tests/check-source-size.sh
      - name: Check PowerShell source-size fixtures
        run: pwsh -File scripts/tests/check-source-size.ps1
      - name: Check architecture boundaries
        run: make architecture-check
      - name: Check Go formatting and vet
        working-directory: backend
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
      - name: Run backend tests
        working-directory: backend
        run: go test ./... -count=1
      - name: Commit fixes to current PR branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -r .review-fixes
          git add backend deploy docs scripts
          git diff --cached --check
          git commit -m "Harden E2 security and replay contracts"
          git push origin HEAD:Database-Kernel-and-Reliability-Primitives
