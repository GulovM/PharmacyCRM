name: Apply final integrated documentation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Apply amendment incorporation
        shell: bash
        run: |
          python3 .github/scripts/finalize_docs.py || true
          python3 .github/scripts/finalize_integrated_docs.py

      - name: Commit final documentation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Complete amendment incorporation and close Gate E0"
          git push origin HEAD:main
