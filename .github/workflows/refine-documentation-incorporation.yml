name: Refine incorporated documentation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove residual cross-document contradictions
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          docs = Path('docs')

          def read(name):
              return (docs / name).read_text(encoding='utf-8')

          def write(name, text):
              (docs / name).write_text(text.rstrip() + '\n', encoding='utf-8')

          def replace_section(text, start_heading, next_heading, replacement):
              pattern = re.compile(
                  rf'^{re.escape(start_heading)}\n.*?(?=^{re.escape(next_heading)}\n)',
                  re.M | re.S,
              )
              if not pattern.search(text):
                  raise RuntimeError(f'section not found: {start_heading}')
              return pattern.sub(replacement.rstrip() + '\n\n', text, count=1)

          # Historical amendment: no longer participates in source-of-truth priority.
          name = '00-01-cross-document-consistency.md'
          text = read(name)
          text = replace_section(
              text,
              '## 1. Назначение и нормативный приоритет',
              '## 2. Результат review',
              '''## 1. Историческое назначение

Документ сохраняет контекст cross-document review, выполненного до инкорпорации. Он показывает, какие расхождения были обнаружены, какой вариант был выбран и в какие исходные документы он перенесён.

После статуса `Incorporated` документ:

- не участвует в нормативном порядке приоритетов;
- не заменяет Architecture, API Design, Database Design, Domain Model, Security Design и другие исходные документы;
- не используется реализацией как самостоятельный источник правил;
- обновляется только для сохранения достоверной истории инкорпорации.

Актуальный порядок приоритетов определяется `00-documentation-index.md`, Product Vision, SRS, принятыми ADR и соответствующими исходными документами.'''
          )
          text = replace_section(
              text,
              '## 7.3 version-counter авторизации',
              '## 8. API paths как источник истины',
              '''## 7.3 Актуальность authorization state

Отдельное скрытое поле или счётчик для инвалидирования доступа не используется. Актуальность доступа определяется текущими записями:

- `users.status`, `users.version` и `password_changed_at`;
- active role assignment;
- active, non-revoked и non-expired session;
- active pharmacy assignment;
- pharmacy state.

Введение нового механизма инвалидирования требует отдельного ADR, изменения схемы, migrations и синхронизации session/API semantics.'''
          )
          text = replace_section(
              text,
              '## 10. Return terminology и protocol',
              '## 11. Import states',
              '''## 10. Return terminology и protocol

Domain/API enum `ReturnAction` содержит только:

- `RESTOCK`;
- `WRITE_OFF`;
- `QUARANTINE`;
- `NO_PHYSICAL_RETURN`.

Типы складских операций возврата относятся к `InventoryOperation.type`, а не к `ReturnAction`.

Для customer-returned medicines утверждённая Gate E0 policy запрещает перевод в sellable stock: production flow использует `QUARANTINE`, `WRITE_OFF` или `NO_PHYSICAL_RETURN`. `RESTOCK` допустим только для отдельного юридически и операционно утверждённого non-customer flow.

Return production path остаётся закрытым до реализации утверждённых refund/rounding и elevated-approval controls.'''
          )
          text = re.sub(
              r'^## 20\. Правило сопровождения\n.*\Z',
              '''## 20. Историческое сопровождение

Новый конфликт устраняется непосредственно во всех затронутых исходных документах в одном change set и при необходимости оформляется ADR. Этот исторический amendment не расширяется новыми активными правилами.

Если требуется новый amendment, создаётся отдельный пронумерованный документ с собственным статусом и явной матрицей инкорпорации.''',
              text,
              flags=re.M | re.S,
          )
          write(name, text)

          # Architecture: make the original module table identical to the incorporated ownership model.
          name = '04-architecture.md'
          text = read(name)
          text = replace_section(
              text,
              '## 4. Логические модули backend',
              '## 5. Владение данными и межмодульные границы',
              '''## 4. Логические модули backend

Нормативная декомпозиция backend:

| Модуль | Ответственность |
|---|---|
| `identity` | пользователи, credentials, роли и sessions |
| `pharmacy` | аптеки, публичные данные точки и история `pharmacy_assignments` |
| `catalog` | глобальный каталог, presentations, barcodes, requests, import staging и moderation |
| `assortment` | ассортимент аптеки, локальные цены и правила отпуска |
| `inventory` | receipts, initial stock, lots, movements, write-offs и adjustments |
| `sales` | продажи, snapshots, totals и FEFO allocations |
| `returns` | возвраты по исходным sale allocations и refund state |
| `reliability` | idempotency, transactional outbox, retry/lease protocol |
| `audit` | неизменяемые audit events |
| `alerts` | low-stock/expiry/reconciliation alerts |
| `search` | rebuildable public availability/read projections |
| `replenishment` | вычисляемые рекомендации ручного пополнения |

Отдельные backend modules `import`, `receipt` и `adjustments` не создаются. Их use cases принадлежат соответственно `catalog` или `inventory`. Физическое совместное размещение возможно только без изменения указанного ownership и публичных module contracts.'''
          )
          write(name, text)

          # API: UUID example and only genuinely open post-E0 decisions.
          name = '05-api-design.md'
          text = read(name)
          text = text.replace('{"id":"01JZX3E2J9Q4JY3N8VY6F7XH2A"}', '{"id":"a9aa71f1-6c24-4c6d-b2db-388ecbbbd2ea"}')
          text = re.sub(
              r'^## 24\. Открытые решения\n.*?(?=^<!-- consistency-incorporated:start -->)',
              '''## 24. Remaining non-E0 decisions

Gate E0 transport, session, legal-return baseline, retention, package manager и API generation strategy утверждены. До реализации соответствующих endpoint-ов остаётся детализировать:

1. atomic или partial catalog staging publication;
2. elevated approval model для void/reverse/adjustment;
3. ETag/resource-version transport policy;
4. MIME, size, row и complexity limits импортов;
5. public availability cache TTL и freshness budget.

Эти вопросы не разрешают альтернативные auth transport, idempotency identity, URL paths, persisted states или generated-client flow.

''',
              text,
              flags=re.M | re.S,
          )
          write(name, text)

          # Domain ownership and Reliability aggregate list.
          name = '07-domain-model.md'
          text = read(name)
          text = text.replace(
              '| Reliability | идемпотентность команд | `IdempotencyRecord` |',
              '| Reliability | идемпотентность и durable post-commit delivery | `IdempotencyRecord`, `OutboxEvent` |',
          )
          text = text.replace(
              '`SaleReturnID`, `IdempotencyRecordID`, `AuditEventID`',
              '`SaleReturnID`, `IdempotencyRecordID`, `OutboxEventID`, `AuditEventID`',
          )
          write(name, text)

          # Security: Gate E0 decisions are approved, not still awaiting selection.
          name = '09-security-design.md'
          text = read(name)
          text = replace_section(
              text,
              '## 27. Обязательные ADR до production',
              '## 28. Открытые вопросы',
              '''## 27. Утверждённые security decisions и дальнейшая формализация

Gate E0 утвердил password hashing, access/refresh transport, session invalidation, ADMIN TOTP MFA/recovery, trusted proxy, CORS/CSRF и базовую retention policy. Их реализация не может выбирать альтернативный механизм без нового ADR и синхронного изменения документов.

До production необходимо формализовать operational implementation для:

1. secret manager и процедур rotation/recovery;
2. backup encryption и restore authorization;
3. security monitoring, incident severity и notification workflow;
4. TLS и network identities между backend и PostgreSQL.

Эти решения уточняют инфраструктурную реализацию и не открывают повторно закрытые Gate E0 security semantics.'''
          )
          text = replace_section(
              text,
              '## 28. Открытые вопросы',
              '## 29. Правило сопровождения',
              '''## 28. Открытые вопросы

До production необходимо детализировать:

- jurisdiction-specific extension сроков хранения и legal hold поверх minimum baseline;
- точный secret manager;
- TLS backend → PostgreSQL;
- WAF/rate-limit implementation;
- механизм проверки compromised passwords;
- требования уведомления пользователей об инциденте;
- правила confidential exports;
- процедуру emergency access к production.

Открытый вопрос не отменяет утверждённые Argon2id, token/cookie, session revoke, TOTP MFA, proxy/CORS/CSRF и deny-by-default controls.'''
          )
          write(name, text)

          # Sequence diagrams: rewrite critical scenarios, not merely append an override.
          name = '10-sequence-diagrams.md'
          text = read(name)
          text = text.replace('SELECT user id, status, hash, auth version', 'SELECT user id, status, password_hash, password_changed_at, version')
          text = text.replace('SELECT status/version-counter авторизации FOR UPDATE', 'SELECT status, password_changed_at, version FOR UPDATE')
          text = text.replace('SELECT current status/auth version', 'SELECT current user, session and role state')
          text = text.replace('UPDATE status/version-counter авторизации', 'UPDATE status, version')
          text = text.replace('Status, auth version, session revocation and audit are atomic.', 'User status, session revocation and audit are atomic.')

          text = replace_section(
              text,
              '## 3. Общий шаблон mutation',
              '## 4. Вход пользователя и создание сессии',
              '''## 3. Общий шаблон mutation

```mermaid
sequenceDiagram
    autonumber
    actor Client
    participant HTTP
    participant UC as UseCase
    participant UoW
    participant Idem
    participant Policy
    participant Repo
    participant Audit
    participant Outbox
    participant DB

    Client->>HTTP: Protected mutation + Idempotency-Key
    HTTP->>HTTP: Validate credential format, DTO, limits and headers
    HTTP->>UC: Execute(command, actor_context)
    UC->>UoW: Run bounded transaction
    UoW->>DB: BEGIN
    UC->>Idem: Claim actor + operation + scope + key
    Idem->>DB: INSERT or lock idempotency record
    UC->>Policy: Revalidate user, session, role, assignment and pharmacy
    Policy->>DB: Lock/read current authorization state
    alt completed replay and currently visible
        UoW->>DB: COMMIT
        HTTP-->>Client: Original committed response + replay flag
    else fingerprint conflict or access no longer valid
        UoW->>DB: ROLLBACK or commit denied audit-only transaction
        HTTP-->>Client: Stable 4xx error
    else new command
        UC->>Repo: Lock roots in canonical order
        Repo->>DB: pharmacy → root document → pharmacy_products → source allocations → FEFO lots
        UC->>UC: Recompute mutable eligibility, quantities, prices and limits
        UC->>Repo: Persist document, allocations, balances and movements
        Repo->>DB: INSERT/UPDATE
        UC->>Audit: Insert required transactional audit
        Audit->>DB: INSERT
        UC->>Outbox: Insert durable committed-fact events
