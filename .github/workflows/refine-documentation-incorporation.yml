        UC->>Idem: Complete replayable result
        Idem->>DB: UPDATE COMPLETED
        UoW->>DB: COMMIT
        HTTP-->>Client: Success
    end
```

Retryable `40001`/`40P01` повторяет всю transaction function, начиная с idempotency claim. Успешный response возвращается только после commit.'''
          )

          text = replace_section(
