name: Fix roadmap residual amendment reference

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-roadmap-line.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update roadmap and remove temporary workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/11-development-roadmap.md')
          text = path.read_text(encoding='utf-8')
          old = '- cross-document amendment переведён в `Incorporated`;'
          new = '- правила cross-document amendment полностью перенесены в основные документы, а промежуточный файл удалён;'
          if old not in text:
              raise SystemExit('target line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/fix-roadmap-line.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/11-development-roadmap.md
          git commit -m "Remove obsolete amendment status from roadmap"
          git push
