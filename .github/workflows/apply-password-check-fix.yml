name: Apply password retirement verification fix

on:
  pull_request:
  push:
    branches:
      - Database-Kernel-and-Reliability-Primitives

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Database-Kernel-and-Reliability-Primitives
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Patch privileged password-null verification
        run: |
          python - <<'PY'
          from pathlib import Path

          sql = Path('deploy/scripts/provision-postgres-roles.sql')
          text = sql.read_text()
          old = 'IF EXISTS (SELECT 1 FROM pg_roles WHERE oid = target_oid AND rolpassword IS NOT NULL) THEN'
          new = 'IF EXISTS (SELECT 1 FROM pg_authid WHERE oid = target_oid AND rolpassword IS NOT NULL) THEN'
          if text.count(old) != 1:
              raise RuntimeError(f'expected one provisioning password check, found {text.count(old)}')
          sql.write_text(text.replace(old, new, 1))

          test = Path('deploy/scripts/tests/test-e1-role-upgrade.sh')
          text = test.read_text()
          old = '''psql "$admin_database_dsn" -X -At -v ON_ERROR_STOP=1 -v legacy_role="$legacy_runtime" <<'SQL' | grep -Fx "f||0|0|0"
          SELECT role.rolcanlogin,
                 COALESCE(role.rolpassword, ''),
                 (SELECT count(*) FROM pg_auth_members WHERE roleid=role.oid OR member=role.oid),'''
          new = '''psql "$admin_database_dsn" -X -At -v ON_ERROR_STOP=1 -v legacy_role="$legacy_runtime" <<'SQL' | grep -Fx "f|t|0|0|0"
          SELECT role.rolcanlogin,
                 NOT EXISTS (
                     SELECT 1 FROM pg_authid auth
                     WHERE auth.oid=role.oid AND auth.rolpassword IS NOT NULL
                 ),
                 (SELECT count(*) FROM pg_auth_members WHERE roleid=role.oid OR member=role.oid),'''
          if text.count(old) != 1:
              raise RuntimeError(f'expected one legacy password assertion, found {text.count(old)}')
          text = text.replace(old, new, 1)
          old = '''psql "$admin_database_dsn" -X -At -v ON_ERROR_STOP=1 <<'SQL' | grep -Fx "f||0|0|0|0"
          SELECT role.rolcanlogin,
                 COALESCE(role.rolpassword, ''),
                 (SELECT count(*) FROM pg_auth_members WHERE roleid=role.oid OR member=role.oid),'''
          new = '''psql "$admin_database_dsn" -X -At -v ON_ERROR_STOP=1 <<'SQL' | grep -Fx "f|t|0|0|0|0"
          SELECT role.rolcanlogin,
                 NOT EXISTS (
                     SELECT 1 FROM pg_authid auth
                     WHERE auth.oid=role.oid AND auth.rolpassword IS NOT NULL
                 ),
                 (SELECT count(*) FROM pg_auth_members WHERE roleid=role.oid OR member=role.oid),'''
          if text.count(old) != 1:
              raise RuntimeError(f'expected one compatibility password assertion, found {text.count(old)}')
          test.write_text(text.replace(old, new, 1))
          PY
      - name: Commit password retirement verification fix
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add deploy/scripts/provision-postgres-roles.sql deploy/scripts/tests/test-e1-role-upgrade.sh
          git diff --cached --check
          git commit -m 'Verify retired passwords through pg_authid'
          git push origin HEAD:Database-Kernel-and-Reliability-Primitives
