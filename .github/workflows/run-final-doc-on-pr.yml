name: Run final documentation migration on PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Apply and validate documentation migration
        id: finalize
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 .github/scripts/finalize_docs.py > /tmp/finalize-docs.log 2>&1
          code=$?
          printf '%s\n' "$code" > /tmp/finalize-docs.exit
          exit "$code"

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-doc-migration-diagnostics
          path: |
            /tmp/finalize-docs.log
            /tmp/finalize-docs.exit
          if-no-files-found: error
          retention-days: 1

      - name: Commit completed migration
        if: steps.finalize.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/scripts/finalize_docs.py .github/workflows/run-final-doc-migration.yml .github/workflows/run-final-doc-on-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete documentation amendment incorporation"
          git push origin HEAD:main

      - name: Report migration failure
        if: steps.finalize.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/finalize-docs.log
          exit 1
