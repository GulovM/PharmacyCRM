name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality and generated contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.28.1'
      - name: Install frontend dependencies from lockfile
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Check Go formatting
        working-directory: backend
        run: test -z "$(gofmt -l .)"
      - name: Run backend static checks and tests
        working-directory: backend
        run: |
          go vet ./...
          go test ./...
      - name: Run frontend lint, type checks and tests
        working-directory: frontend
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
      - name: Verify generated OpenAPI client is current
        working-directory: frontend
        run: |
          pnpm generate:api
          git diff --exit-code -- src/shared/api/generated/schema.ts
      - name: Check architecture boundaries
        run: make architecture-check

  migration-smoke:
    name: Migration from zero
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_DB: pharmacycrm
          POSTGRES_USER: pharmacycrm
          POSTGRES_PASSWORD: ci-only-password
        options: >-
          --health-cmd "pg_isready -U pharmacycrm -d pharmacycrm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      POSTGRES_RUNTIME_DSN: postgres://runtime_user:runtime-ci-password@localhost:5432/pharmacycrm?sslmode=disable
      POSTGRES_MIGRATION_DSN: postgres://migration_user:migration-ci-password@localhost:5432/pharmacycrm?sslmode=disable
      AUTH_JWT_ISSUER: pharmacycrm-ci
      AUTH_JWT_AUDIENCE: pharmacycrm-ci
      AUTH_JWT_PRIVATE_KEY: ci-only-key
      AUTH_REFRESH_TOKEN_PEPPER: ci-only-pepper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Provision separate runtime and migration roles
        env:
          PGPASSWORD: ci-only-password
        run: |
          psql -h localhost -U pharmacycrm -d pharmacycrm -v database_name=pharmacycrm -v runtime_role=runtime_user -v runtime_password=runtime-ci-password -v migration_role=migration_user -v migration_password=migration-ci-password -f deploy/scripts/provision-postgres-roles.sql
      - name: Apply migrations to an empty database
        working-directory: backend
        run: go run ./cmd/migrate
      - name: Verify Unit of Work against PostgreSQL
        working-directory: backend
        env:
          POSTGRES_TEST_DSN: ${{ env.POSTGRES_MIGRATION_DSN }}
        run: go test ./internal/platform/database -run 'Test(Transaction|RetryingTransaction)RunnerIntegration' -count=1
      - name: Verify schema metadata and least-privilege runtime role
        env:
          PGPASSWORD: ci-only-password
        run: |
          PGPASSWORD=runtime-ci-password psql -h localhost -U runtime_user -d pharmacycrm -Atc 'SELECT MAX(version) FROM pharmacycrm_schema_migrations' | grep -x '13'
          PGPASSWORD=runtime-ci-password psql -h localhost -U runtime_user -d pharmacycrm -Atc 'SELECT schema_version FROM pharmacycrm_schema_metadata WHERE singleton' | grep -x '13'
          PGPASSWORD=runtime-ci-password psql -h localhost -U runtime_user -d pharmacycrm -Atc "SELECT count(*) FROM roles WHERE is_system AND code IN ('CLIENT','PHARMACIST','ADMIN')" | grep -x '3'
          PGPASSWORD=runtime-ci-password psql -h localhost -U runtime_user -d pharmacycrm -Atc "SELECT has_schema_privilege(current_user, 'public', 'CREATE')" | grep -x 'f'
          PGPASSWORD=runtime-ci-password psql -h localhost -U runtime_user -d pharmacycrm -Atc "SELECT has_table_privilege(current_user, 'inventory_movements', 'UPDATE')" | grep -x 'f'
          PGPASSWORD=runtime-ci-password psql -h localhost -U runtime_user -d pharmacycrm -Atc "SELECT has_table_privilege(current_user, 'audit_events', 'DELETE')" | grep -x 'f'

  security-and-containers:
    name: Security and container builds
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scanners: vuln,secret,config
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Build backend without build secrets
        run: docker build --pull --file backend/Dockerfile --tag pharmacycrm-backend:ci backend
      - name: Build frontend without build secrets
        run: docker build --pull --file frontend/Dockerfile --tag pharmacycrm-frontend:ci frontend
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: pharmacycrm-backend:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: pharmacycrm-frontend:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'

  documentation:
    name: Documentation links and Mermaid
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Validate Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress 'README.md' 'docs/**/*.md'
          fail: true
          failIfEmpty: false
      - name: Extract Mermaid diagrams
        run: node scripts/extract-mermaid.mjs "$RUNNER_TEMP/mermaid"
      - name: Render Mermaid diagrams
        run: |
          for diagram in "$RUNNER_TEMP"/mermaid/*.mmd; do
            npx --yes @mermaid-js/mermaid-cli@11.4.2 -p scripts/mermaid-puppeteer.json -i "$diagram" -o "$RUNNER_TEMP/diagram.svg"
          done
