name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality and generated contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.28.1'
      - name: Install frontend dependencies from lockfile
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Check Go formatting
        working-directory: backend
        run: test -z "$(gofmt -l .)"
      - name: Run backend static checks and tests
        working-directory: backend
        run: |
          go vet ./...
          go test ./...
      - name: Run frontend lint, type checks and tests
        working-directory: frontend
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
      - name: Verify generated OpenAPI client is current
        working-directory: frontend
        run: |
          pnpm generate:api
          git diff --exit-code -- src/shared/api/generated/schema.ts
      - name: Check architecture boundaries
        run: make architecture-check

  migration-smoke:
    name: Migration from zero
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_DB: pharmacycrm
          POSTGRES_USER: pharmacycrm
          POSTGRES_PASSWORD: ci-only-password
        options: >-
          --health-cmd "pg_isready -U pharmacycrm -d pharmacycrm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      POSTGRES_API_RUNTIME_DSN: postgres://api_user:api-ci-password@localhost:5432/pharmacycrm?sslmode=disable
      POSTGRES_WORKER_RUNTIME_DSN: postgres://worker_user:worker-ci-password@localhost:5432/pharmacycrm?sslmode=disable
      POSTGRES_MIGRATION_DSN: postgres://migration_user:migration-ci-password@localhost:5432/pharmacycrm?sslmode=disable
      POSTGRES_TEST_DSN: postgres://migration_user:migration-ci-password@localhost:5432/pharmacycrm?sslmode=disable
      POSTGRES_ADMIN_TEST_DSN: postgres://pharmacycrm:ci-only-password@localhost:5432/pharmacycrm?sslmode=disable
      CI_INTEGRATION_REQUIRED: 'true'
      AUTH_JWT_ISSUER: pharmacycrm-ci
      AUTH_JWT_AUDIENCE: pharmacycrm-ci
      AUTH_JWT_PRIVATE_KEY: ci-only-key
      AUTH_REFRESH_TOKEN_PEPPER: ci-only-pepper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Provision separate runtime and migration roles
        env:
          PGPASSWORD: ci-only-password
        run: |
          psql -h localhost -U pharmacycrm -d pharmacycrm -v database_name=pharmacycrm -v api_role=api_user -v api_password=api-ci-password -v worker_role=worker_user -v worker_password=worker-ci-password -v migration_role=migration_user -v migration_password=migration-ci-password -f deploy/scripts/provision-postgres-roles.sql
      - name: Verify E1 to E2 migration upgrade path
        working-directory: backend
        run: go test ./internal/platform/migration -run UpgradeFromE1Integration -count=1
      - name: Apply migrations to an empty database
        working-directory: backend
        run: go run ./cmd/migrate
      - name: Run mandatory E2 PostgreSQL integration tests
        working-directory: backend
        run: |
          test -n "$POSTGRES_TEST_DSN"
          test "$CI_INTEGRATION_REQUIRED" = "true"
          go test ./internal/platform/migration -run Integration -count=1
          go test ./internal/platform/database -run Integration -count=1
          go test ./internal/modules/reliability/infrastructure/postgres -run Integration -count=1
          go test ./internal/modules/audit/infrastructure/postgres -run Integration -count=1
          go test ./internal/orchestration/outboxreplay/postgres -run Integration -count=1
          go test ./internal/testkit/reconciliation -run Integration -count=1
          go test ./internal/testkit/schema -run Integration -count=1
          go test ./internal/bootstrap -count=1
      - name: Run database and reliability race detector suites
        working-directory: backend
        run: |
          go test -race ./internal/platform/database/... -count=1
          go test -race ./internal/modules/reliability/... -count=1
      - name: Verify schema metadata and least-privilege runtime role
        env:
          PGPASSWORD: ci-only-password
        run: |
          PGPASSWORD=api-ci-password psql -h localhost -U api_user -d pharmacycrm -Atc 'SELECT MAX(version) FROM pharmacycrm_schema_migrations' | grep -x '21'
          PGPASSWORD=api-ci-password psql -h localhost -U api_user -d pharmacycrm -Atc 'SELECT schema_version FROM pharmacycrm_schema_metadata WHERE singleton' | grep -x '21'
          PGPASSWORD=worker-ci-password psql -h localhost -U worker_user -d pharmacycrm -Atc "SELECT has_column_privilege(current_user, 'users', 'password_hash', 'SELECT')" | grep -x 'f'
          PGPASSWORD=worker-ci-password psql -h localhost -U worker_user -d pharmacycrm -Atc "SELECT has_column_privilege(current_user, 'user_sessions', 'refresh_token_hash', 'SELECT')" | grep -x 'f'
          PGPASSWORD=worker-ci-password psql -h localhost -U worker_user -d pharmacycrm -Atc "SELECT has_table_privilege(current_user, 'outbox_events', 'DELETE')" | grep -x 'f'

  security-and-containers:
    name: Security and container builds
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scanners: vuln,secret,config
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Build backend without build secrets
        run: docker build --pull --file backend/Dockerfile --tag pharmacycrm-backend:ci backend
      - name: Build frontend without build secrets
        run: docker build --pull --file frontend/Dockerfile --tag pharmacycrm-frontend:ci frontend
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: pharmacycrm-backend:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: pharmacycrm-frontend:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'

  documentation:
    name: Documentation links and Mermaid
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Validate Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress 'README.md' 'docs/**/*.md'
          fail: true
          failIfEmpty: false
      - name: Extract Mermaid diagrams
        run: node scripts/extract-mermaid.mjs "$RUNNER_TEMP/mermaid"
      - name: Render Mermaid diagrams
        run: |
          for diagram in "$RUNNER_TEMP"/mermaid/*.mmd; do
            npx --yes @mermaid-js/mermaid-cli@11.4.2 -p scripts/mermaid-puppeteer.json -i "$diagram" -o "$RUNNER_TEMP/diagram.svg"
          done
