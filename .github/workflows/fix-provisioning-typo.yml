name: Fix provisioning syntax

on:
  pull_request:
  push:
    branches:
      - Database-Kernel-and-Reliability-Primitives

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Database-Kernel-and-Reliability-Primitives
      - name: Correct role option spelling
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('deploy/scripts/provision-postgres-roles.sql')
          text = path.read_text()
          if text.count('PASSORD NULL') != 1:
              raise RuntimeError(f"expected one typo, found {text.count('PASSORD NULL')}")
          path.write_text(text.replace('PASSORD NULL', 'PASSWORD NULL', 1))
          PY
      - name: Commit syntax correction
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add deploy/scripts/provision-postgres-roles.sql
          git diff --cached --check
          git commit -m 'Fix migration group role password reset syntax'
          git push origin HEAD:Database-Kernel-and-Reliability-Primitives
