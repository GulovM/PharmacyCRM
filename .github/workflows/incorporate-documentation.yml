          {gate_e0_table}

          ### Password verification/rehash

          Password hash хранится как PHC string. Verify поддерживает только явно зарегистрированные legacy/current algorithms. После успешной проверки backend сравнивает algorithm/parameters с current Argon2id policy и атомарно обновляет hash; login не сообщает клиенту, был ли выполнен rehash. Password, raw token, recovery code и hash никогда не логируются.

          ### Access/refresh transport

          Access JWT хранится browser только в памяти. Refresh token — opaque secret в host-only Secure HttpOnly SameSite=Strict cookie; database хранит только cryptographic hash. Refresh rotation и old-token revoke выполняются одной транзакцией. Reuse вызывает family revoke, security audit и rate-limit escalation.

          ### Authorization freshness/session invalidation

          Critical mutation внутри transaction повторно читает current user, session, role, assignment и pharmacy. Отдельный скрытый version-counter не используется. Security-state change и session revocation commit-ятся до успешного response.

