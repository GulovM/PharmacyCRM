name: Incorporate documentation amendment

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/incorporate-documentation.yml"

permissions:
  contents: write

jobs:
  incorporate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Incorporate amendment and close Gate E0
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import subprocess

          ROOT = Path(".")
          DOCS = ROOT / "docs"
          TODAY = "2026-07-20"

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, text):
              text = text.rstrip() + "\n"
              Path(path).write_text(text, encoding="utf-8")

          def set_meta(path, version=None, status=None):
              text = read(path)
              if status:
                  text = re.sub(
                      r"(\*\*Статус(?: документа)?:\*\*\s*)[^\n]+",
                      lambda m: m.group(1) + status + "  ",
                      text,
                      count=1,
                  )
              if version:
                  if re.search(r"\*\*Версия(?: документа)?:\*\*", text):
                      text = re.sub(
                          r"(\*\*Версия(?: документа)?:\*\*\s*)[^\n]+",
                          lambda m: m.group(1) + version + "  ",
                          text,
                          count=1,
                      )
              text = re.sub(
                  r"(\*\*Дата:\*\*\s*)[^\n]+",
                  lambda m: m.group(1) + TODAY + "  ",
                  text,
                  count=1,
              )
              write(path, text)

          def upsert_block(path, key, body, before=None):
              text = read(path)
              start = f"<!-- {key}:start -->"
              end = f"<!-- {key}:end -->"
              block = f"\n{start}\n{body.strip()}\n{end}\n"
              pattern = re.compile(
                  rf"\n?{re.escape(start)}.*?{re.escape(end)}\n?",
                  re.S,
              )
              if pattern.search(text):
                  text = pattern.sub(block, text, count=1)
              elif before and before in text:
                  text = text.replace(before, block + "\n" + before, 1)
              else:
                  text = text.rstrip() + "\n" + block
              write(path, text)

          def replace_section(path, start_heading, next_heading, replacement):
              text = read(path)
              pattern = re.compile(
                  rf"^{re.escape(start_heading)}\n.*?(?=^{re.escape(next_heading)}\n)",
                  re.M | re.S,
              )
              if not pattern.search(text):
                  raise RuntimeError(f"Section not found in {path}: {start_heading}")
              text = pattern.sub(replacement.rstrip() + "\n\n", text, count=1)
              write(path, text)

          def normalize_active_docs(path):
              text = read(path)
              replacements = {
                  "`auth_version`": "version-counter авторизации",
                  "auth_version": "version-counter авторизации",
                  "SalePosted": "SaleCompleted",
                  "ReturnPosted": "SaleReturnCompleted",
                  "sales.sale.posted": "sales.sale.completed",
                  "READY_FOR_REVIEW": "legacy review-ready transport label",
                  "/api/v1/admin/users/{id}/block": "/api/v1/admin/users/{user_id}/block",
                  "/api/v1/admin/users/{id}/pharmacy-assignments": "/api/v1/admin/users/{user_id}/pharmacy-assignments",
                  "/api/v1/admin/users/{user_id}/assignments": "/api/v1/admin/users/{user_id}/pharmacy-assignments",
                  "/api/v1/admin/pharmacy-assignments/{assignment_id}": "/api/v1/admin/users/{user_id}/pharmacy-assignments/{assignment_id}",
                  "/api/v1/sales/{sale_id}/returns": "/api/v1/pharmacies/{pharmacy_id}/returns",
                  "/api/v1/pharmacies/{pharmacy_id}/sales/{sale_id}/returns": "/api/v1/pharmacies/{pharmacy_id}/returns",
              }
              for old, new in replacements.items():
                  text = text.replace(old, new)
              write(path, text)

          module_table = """
          | Module owner | Таблицы / данные |
          |---|---|
          | `identity` | `users`, `roles`, `user_roles`, `user_sessions` |
          | `pharmacy` | `pharmacies`, `pharmacy_assignments` |
          | `catalog` | `products`, `product_presentations`, `product_barcodes`, `product_requests`, `import_jobs`, `import_rows` |
          | `assortment` | `pharmacy_products` |
          | `inventory` | `inventory_operations`, `inventory_movements`, `stock_lots`, `receipts`, `receipt_items`, `write_offs`, `write_off_items`, `inventory_adjustments`, `inventory_adjustment_items` |
          | `sales` | `sales`, `sale_items`, `sale_item_allocations` |
          | `returns` | `sale_returns`, `sale_return_items`, `sale_return_item_allocations` |
          | `reliability` | `idempotency_records`, `outbox_events` |
          | `audit` | `audit_events` |
          | `alerts` | `alerts` |
          | `search` | rebuildable public projections/read models |
          | `replenishment` | вычисляемые recommendation read models |
          """

          mutation_protocol = """
          Для authenticated critical mutation действует один порядок:

          1. delivery проверяет формат credential, DTO, headers и transport limits;
          2. до транзакции выполняются только детерминированные validation/canonicalization;
          3. Unit of Work начинает PostgreSQL transaction;
          4. первым сериализующим lock берётся idempotency identity `actor + operation + effective_scope + key`;
          5. внутри транзакции повторно читаются actor, session, role, pharmacy assignment и pharmacy state;
          6. replay возвращается только после текущей authorization и result-visibility revalidation;
          7. business roots блокируются в каноническом порядке;
          8. после locks повторно вычисляются eligibility, prices, quantities, FEFO и return limits;
          9. атомарно сохраняются business effect, snapshots, allocations, lot balances и append-only movements;
          10. сохраняются обязательный transactional audit и необходимые outbox rows;
          11. idempotency record переводится в `COMPLETED`;
          12. commit предшествует успешному HTTP response.

          Retryable PostgreSQL error повторяет всю transaction function с шага idempotency claim. Внешний network side effect внутри transaction callback запрещён.
          """

          lock_order = """
          Канонический lock order:

          1. idempotency scope/key;
          2. current actor/user/session/role для security-sensitive mutation;
          3. target user, если он изменяется;
          4. pharmacy;
          5. root document (`sale`, `receipt`, `sale_return`, adjustment/reversal root);
          6. `pharmacy_products` по `id`;
          7. sale items/source allocations по `id`;
          8. stock lots по `expiration_date`, затем `received_at`, затем `id`;
          9. insert documents, allocations, movements, audit, outbox и completed idempotency result;
          10. commit.

          Неиспользуемый уровень пропускается без изменения взаимного порядка остальных locks.
          """

          event_catalog = """
          | Context | Канонические committed events |
          |---|---|
          | Identity | `UserCreated`, `UserBlocked`, `UserUnblocked`, `UserArchived`, `UserPasswordChanged`, `UserRoleAssigned`, `UserRoleRevoked`, `SessionCreated`, `SessionRotated`, `SessionRevoked` |
          | Pharmacy | `PharmacistAssigned`, `PharmacistAssignmentEnded` |
          | Catalog | `ProductCreated`, `ProductArchived`, `PresentationCreated`, `BarcodeAssigned`, `CatalogImportCompleted` |
          | Assortment | `PharmacyProductActivated`, `PharmacyProductPriceChanged` |
          | Inventory | `ReceiptPosted`, `InitialStockConfirmed`, `WriteOffCompleted`, `InventoryAdjusted`, `InventoryOperationReversed` |
          | Sales | `SaleCompleted`, `SalePartiallyRefunded`, `SaleRefunded`, `SaleReversed` |
          | Returns | `SaleReturnCompleted`, `SaleReturnReversed` |

          Domain event отражает уже committed business fact и именуется в прошедшем времени. Technical names используют lower-case dot namespace, например `sales.sale.completed`, но не меняют бизнес-семантику.
          """

          gate_e0_table = """
          | Решение | Утверждённый baseline |
          |---|---|
          | Password hashing | Argon2id PHC string: `m=65536 KiB`, `t=3`, `p=2`, salt 16 bytes, hash 32 bytes. Rehash после успешной проверки, если algorithm/parameters ниже current policy. |
          | Access token | JWT `EdDSA`/Ed25519, TTL 10 минут, обязательные `iss`, `aud`, `sub`, `sid`, `iat`, `nbf`, `exp`, `jti`, `kid`; private keys вне repository, rotation каждые 90 дней с overlap не менее 20 минут. |
          | Refresh token | Opaque CSPRNG token 32 bytes; хранится только hash. Browser transport: host-only `__Secure-pharmacy_refresh`, `Secure`, `HttpOnly`, `SameSite=Strict`, `Path=/api/v1/auth`; absolute TTL 30 дней, idle TTL 7 дней, rotation при каждом refresh. |
          | Session invalidation | Block/archive, password change/recovery, role revoke/change, assignment end/change и compromise отзывают все применимые sessions; refresh reuse отзывает token family; logout отзывает current session, logout-all — все sessions. |
          | Transaction retry | Только `40001` и `40P01`; максимум 3 попытки на request path, whole-transaction retry, full-jitter exponential backoff от 25 ms с cap 250 ms. |
          | Outbox delivery | At-least-once, batch 100, lease 30 s, guarded completion по `lease_token`, max 8 attempts, full-jitter backoff от 2 s с cap 15 min, затем `DEAD_LETTER`. |
          | Retention | Sessions 90 дней после expiry/revoke; idempotency 30 дней; processed outbox 30 дней; dead letters 180 дней; application logs 30 дней hot + 180 дней archive; traces 7 дней; import source 30 дней after success/90 дней after failure; audit/inventory/sales history минимум 5 лет либо дольше по обязательному праву. |
          | Proxy/CORS/CSRF | Trusted proxy CIDR allowlist, default none; forwarded headers only from trusted peers. CORS exact-origin allowlist, no wildcard with credentials. Cookie-auth endpoints require exact `Origin` and `X-CSRF-Protection: 1`; absent/mismatched browser origin is rejected. |
          | RPO/RTO | PostgreSQL production target: RPO ≤ 15 минут, RTO ≤ 4 часа; daily base backup + continuous WAL archive; restore drill at least quarterly. Rebuildable projections do not raise authoritative-data RPO. |
          | Returns | Customer-return mutation is production-disabled by default. Before custody transfer use sale reversal. After transfer, legally approved exception may refund, but physical goods use `QUARANTINE`, `WRITE_OFF` or `NO_PHYSICAL_RETURN`; `RESTOCK` is forbidden for customer-returned medicines. |
          | Frontend package manager | `pnpm` 10.x via Corepack, exact `packageManager` pin and committed `pnpm-lock.yaml`; npm/yarn lockfiles are rejected by CI. |
          | API client generation | OpenAPI 3.1 contract in `backend/api/openapi.yaml`; frontend uses pinned `openapi-typescript` + `openapi-fetch`, output under `frontend/src/shared/api/generated/`; generated code is not edited manually and CI fails on diff. |
          | ADMIN MFA/recovery | TOTP MFA is mandatory for production `ADMIN`; recovery uses one-time recovery codes and audited operator-assisted reset. No security-question recovery. |
          | Release/migrations | Immutable OCI images referenced by digest; migrations run as a separate one-shot job before rollout; no automatic migration on application startup; `expand → migrate/backfill → validate → contract`. |
          """

          amendment = DOCS / "00-01-cross-document-consistency.md"
          subprocess.run(
              [
                  "curl", "-fsSL",
                  "https://raw.githubusercontent.com/GulovM/PharmacyCRM/29a224dc81fa9eb4424976732be4d2d071cc5903/docs/00-01-cross-document-consistency.md",
                  "-o", str(amendment),
              ],
              check=True,
          )
          text = read(amendment)
          text = re.sub(r"\*\*Статус документа:\*\* Accepted amendment", "**Статус документа:** Incorporated", text, count=1)
          text = re.sub(r"\*\*Версия:\*\* 1\.0", "**Версия:** 1.1", text, count=1)
          text = text.replace("`auth_version`", "version-counter авторизации").replace("auth_version", "version-counter авторизации")
          incorporation = """
          ## 0. Статус инкорпорации

          Все нормативные расхождения из редакции 1.0 перенесены в исходные документы `04–14` и проверены на единство ownership, transaction protocol, API paths, persisted states, enum, event naming, deployment и operational controls.

          Документ имеет статус `Incorporated` и сохраняется только как история cross-document review. Он больше не является отдельным активным источником правил: приоритет имеют актуальные исходные документы и принятые ADR/policies.

          Gate E0 закрыт решениями, зафиксированными в Security Design, Database Design, Development Roadmap, Deployment, Testing Strategy и Observability.
          """
          text = text.replace("## 1. Назначение и нормативный приоритет", incorporation.strip() + "\n\n## 1. Назначение и нормативный приоритет", 1)
          text = re.sub(
              r"## 17\. Обязательная матрица инкорпорации\n.*?(?=## 18\.)",
              """## 17. Матрица инкорпорации

          | Документ | Статус |
          |---|---|
          | `04-architecture.md` | Incorporated |
          | `04-01-backend-architecture.md` | Incorporated |
          | `05-api-design.md` | Incorporated |
          | `06-database-design.md` | Incorporated |
          | `07-domain-model.md` | Incorporated |
          | `08-project-structure.md` | Incorporated |
          | `09-security-design.md` | Incorporated |
          | `10-sequence-diagrams.md` | Incorporated |
          | `11-development-roadmap.md` | Incorporated |
          | `12-deployment.md` | Incorporated |
          | `13-testing-strategy.md` | Incorporated |
          | `14-observability.md` | Incorporated |

          """,
              text,
              flags=re.S,
          )
          text = re.sub(
              r"## 18\. Не закрытые этим review решения\n.*?(?=## 19\.)",
              "## 18. Закрытие Gate E0\n\n" + gate_e0_table.strip() + "\n\n",
              text,
              flags=re.S,
          )
          write(amendment, text)
          set_meta(amendment, version="1.1", status="Incorporated")

          index = DOCS / "00-documentation-index.md"
          text = read(index)
          if "`00-01-cross-document-consistency.md`" not in text:
              text = text.replace(
                  "| 00 | `00-documentation-index.md` | карта документации и правила её сопровождения | Active |",
                  "| 00 | `00-documentation-index.md` | карта документации и правила её сопровождения | Active |\n"
                  "| 00-01 | `00-01-cross-document-consistency.md` | исторический cross-document review, полностью включённый в исходные документы | Incorporated |",
                  1,
              )
          text = text.replace(
              "- финального cross-document review;\n- устранения противоречий и открытых вопросов;",
              "- сопровождения уже инкорпорированного cross-document review;\n- предотвращения новых противоречий в одном change set;",
          )
          text = re.sub(
              r"## 8\. Известные задачи синхронизации\n.*?(?=## 9\.)",
              """## 8. Текущий статус синхронизации

          Cross-document consistency amendment полностью инкорпорирован. Gate E0 закрыт: security, reliability, delivery, retention, recovery, legal-return и frontend/tooling baselines утверждены в исходных документах.

          До начала зависимого этапа остаются только implementation evidence соответствующего gate: migrations, tests, restore drills, security review и CI artifacts. Они не являются альтернативными архитектурными решениями.

          """,
              text,
              flags=re.S,
          )
          write(index, text)
          set_meta(index, version="2.2", status="Active")

          p = DOCS / "04-architecture.md"
          upsert_block(
              p,
              "consistency-incorporated",
              f"""## Инкорпорированные архитектурные правила

          ### Единый module ownership

          Нормативный набор backend modules: `identity`, `pharmacy`, `catalog`, `assortment`, `inventory`, `sales`, `returns`, `reliability`, `audit`, `alerts`, `search`, `replenishment`. Отдельные modules `import`, `receipt` и `adjustments` не создаются.

          {module_table}

          `pharmacy_assignments` принадлежат `pharmacy`. Catalog import принадлежит `catalog`; receipt, initial-stock confirmation, write-off и adjustment принадлежат `inventory`; durable idempotency/outbox принадлежат `reliability`.

          ### Critical mutation protocol

          {mutation_protocol}

          ### Lock order

          {lock_order}

          ### Transactional outbox

          Durable post-commit reaction, потеря которой нарушает correctness, projection freshness, alerts, import/security workflow или внешний side effect, обязательно создаёт `outbox_events` row в той же транзакции. Delivery — at-least-once; consumer idempotent; worker использует lease, fencing/guarded completion, bounded retry и dead-letter. Best-effort goroutine/channel не является допустимой заменой.

          ### Event catalog

          {event_catalog}
          """,
              before="## ",
          )
          set_meta(p, version="1.2", status="Draft")

          p = DOCS / "04-01-backend-architecture.md"
          upsert_block(
              p,
              "consistency-incorporated",
              f"""## Инкорпорированные backend boundaries

          Backend package/module ownership полностью совпадает с общей Architecture и Database Design.

          {module_table}

          `pharmacy` владеет aggregate/repository `PharmacyAssignment`; `identity` предоставляет current user/role/session revalidation. `reliability` владеет idempotency и `OutboxEvent`, включая writer и worker protocol. `catalog` включает import use cases; `inventory` включает receipts, initial stock, write-offs и adjustments.

          Application orchestration вызывает owner contracts через use-case-specific Unit of Work. Domain/Application API не принимает `gin.Context`, `pgx.Tx` или driver errors.

          {mutation_protocol}

          Outbox worker размещается в reliability/infrastructure boundary, claim-ит batch после короткой транзакции, выполняет side effect вне business transaction и завершает row только guarded update по актуальному lease token.
          """,
          )
          set_meta(p, version="1.2", status="Draft")

          p = DOCS / "05-api-design.md"
          upsert_block(
              p,
              "consistency-incorporated",
              """## Инкорпорированные API contracts

          ### Authentication transport

          - `POST /api/v1/auth/login` возвращает access token в JSON и устанавливает rotating refresh cookie.
          - `POST /api/v1/auth/refresh`, `POST /api/v1/auth/logout`, `POST /api/v1/auth/logout-all` используют refresh/session contract из Security Design.
          - Access token хранится frontend только in-memory и передаётся `Authorization: Bearer`.
          - Refresh token не возвращается в JSON и не хранится в Web Storage.
          - Cookie-auth endpoints требуют exact allowed `Origin` и `X-CSRF-Protection: 1`.

          ### Нормативные mutation paths

          | Сценарий | Method/path |
          |---|---|
          | Block user | `POST /api/v1/admin/users/{user_id}/block` |
          | Assign pharmacist | `POST /api/v1/admin/users/{user_id}/pharmacy-assignments` |
          | End assignment | `DELETE /api/v1/admin/users/{user_id}/pharmacy-assignments/{assignment_id}` |
          | Post receipt | `POST /api/v1/pharmacies/{pharmacy_id}/receipts` |
          | Complete sale | `POST /api/v1/pharmacies/{pharmacy_id}/sales` |
          | Complete return | `POST /api/v1/pharmacies/{pharmacy_id}/returns` |
          | Post adjustment | `POST /api/v1/pharmacies/{pharmacy_id}/inventory-adjustments` |
          | Upload catalog import | `POST /api/v1/admin/catalog-imports` |

          Return request передаёт `sale_id` в request body согласно endpoint schema. Generic `/api/v1/{documents}/{id}/reverse` не является contract; используются resource-specific endpoints.

          ### Persisted states и enum

          `ImportJob`: `UPLOADED`, `VALIDATING`, `READY`, `HAS_ERRORS`, `CONFIRMING`, `COMPLETED`, `FAILED`.

          `ReturnAction`: `RESTOCK`, `WRITE_OFF`, `QUARANTINE`, `NO_PHYSICAL_RETURN`. Значения `RETURN_TO_STOCK`, `RETURN_WRITE_OFF`, `RETURN_QUARANTINE` относятся к `InventoryOperation.type`.

          `Sale.status`: `COMPLETED`, `PARTIALLY_REFUNDED`, `REFUNDED`, `REVERSED`.

          ### Idempotency и IDs

          Critical mutation требует `Idempotency-Key`. Identity ключа: `actor + operation + effective_scope + key`; pharmacy scope использует `pharmacy_id`, global/admin scope — `GLOBAL`. Replay повторно проверяет authorization и visibility. API ID — opaque UUID string; примеры используют UUID.

          ### Machine-readable contract

          OpenAPI 3.1 хранится в `backend/api/openapi.yaml`. Frontend generated client создаётся pinned `openapi-typescript` + `openapi-fetch`; CI проверяет, что generated output соответствует contract.
          """,
          )
          set_meta(p, version="1.2", status="Draft")

          p = DOCS / "06-database-design.md"
          text = read(p)
          outbox_ddl = r"""CREATE TABLE outbox_events (
              id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
              event_name varchar(150) NOT NULL CHECK (btrim(event_name) <> ''),
              event_version smallint NOT NULL DEFAULT 1 CHECK (event_version > 0),
              aggregate_type varchar(100) NOT NULL CHECK (btrim(aggregate_type) <> ''),
              aggregate_id uuid NOT NULL,
              partition_key varchar(200) NOT NULL CHECK (btrim(partition_key) <> ''),
              deduplication_key varchar(255) NOT NULL UNIQUE CHECK (btrim(deduplication_key) <> ''),
              payload jsonb NOT NULL,
              headers jsonb NOT NULL DEFAULT '{}'::jsonb,
              status varchar(30) NOT NULL DEFAULT 'PENDING'
                  CHECK (status IN ('PENDING', 'PROCESSING', 'PROCESSED', 'DEAD_LETTER')),
              attempt_count smallint NOT NULL DEFAULT 0 CHECK (attempt_count >= 0),
              max_attempts smallint NOT NULL DEFAULT 8 CHECK (max_attempts BETWEEN 1 AND 20),
              available_at timestamptz NOT NULL DEFAULT now(),
              lease_token uuid,
              lease_generation bigint NOT NULL DEFAULT 0 CHECK (lease_generation >= 0),
              leased_by varchar(150),
              lease_expires_at timestamptz,
              last_error_code varchar(100),
              last_error_at timestamptz,
              occurred_at timestamptz NOT NULL,
              created_at timestamptz NOT NULL DEFAULT now(),
              processed_at timestamptz,
              dead_lettered_at timestamptz,
              CONSTRAINT chk_outbox_payload_object
                  CHECK (jsonb_typeof(payload) = 'object'),
              CONSTRAINT chk_outbox_payload_size
                  CHECK (octet_length(payload::text) <= 262144),
              CONSTRAINT chk_outbox_lease CHECK (
                  (status = 'PROCESSING'
                      AND lease_token IS NOT NULL
                      AND leased_by IS NOT NULL
                      AND lease_expires_at IS NOT NULL)
                  OR (status <> 'PROCESSING'
                      AND lease_token IS NULL
                      AND leased_by IS NULL
                      AND lease_expires_at IS NULL)
              ),
              CONSTRAINT chk_outbox_terminal CHECK (
                  (status = 'PROCESSED'
                      AND processed_at IS NOT NULL
                      AND dead_lettered_at IS NULL)
                  OR (status = 'DEAD_LETTER'
                      AND dead_lettered_at IS NOT NULL
                      AND processed_at IS NULL)
                  OR (status IN ('PENDING', 'PROCESSING')
                      AND processed_at IS NULL
                      AND dead_lettered_at IS NULL)
              )
          );

          CREATE INDEX idx_outbox_claim
          ON outbox_events (available_at, created_at, id)
          WHERE status = 'PENDING';

          CREATE INDEX idx_outbox_processing_lease
          ON outbox_events (lease_expires_at, id)
          WHERE status = 'PROCESSING';

          CREATE INDEX idx_outbox_partition
          ON outbox_events (partition_key, occurred_at, id);

          CREATE INDEX idx_outbox_aggregate
          ON outbox_events (aggregate_type, aggregate_id, occurred_at, id);
          """
          pattern = re.compile(
              r"CREATE TABLE outbox_events \(.*?(?=\n-- =====================================================================\n-- Audit)",
              re.S,
          )
          if not pattern.search(text):
              raise RuntimeError("outbox_events DDL block not found")
          text = pattern.sub(outbox_ddl.rstrip() + "\n", text, count=1)
          text = text.replace("Поле `auth_version` не существует. ", "")
          write(p, text)
          upsert_block(
              p,
              "gate-e0-approved",
              f"""## Утверждённые Gate E0 database/reliability policies

          {gate_e0_table}

          ### Outbox worker protocol

          Claim batch size — 100. Worker в короткой transaction выбирает due `PENDING` rows через `FOR UPDATE SKIP LOCKED`, переводит их в `PROCESSING`, увеличивает `attempt_count` и `lease_generation`, устанавливает уникальный `lease_token`, `leased_by`, `lease_expires_at = now() + 30 seconds`, затем commit-ит claim. Side effect выполняется вне claim transaction.

