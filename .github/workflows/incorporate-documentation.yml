          Приложение доверяет forwarded headers только от configured proxy CIDR. CORS использует exact origin allowlist. Cookie-auth mutation отклоняет отсутствующий/неразрешённый `Origin` и требует custom header `X-CSRF-Protection: 1`; wildcard origin и credentialed wildcard запрещены.

          ### ADMIN MFA/recovery

